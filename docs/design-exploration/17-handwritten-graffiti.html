<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MetaVault — Handwritten Graffiti</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Indie+Flower&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #2C2C2C;
    --pencil: #666;
    --highlight-yellow: #FFE066;
    --highlight-pink: #FFB3C6;
    --highlight-blue: #B3D9FF;
    --highlight-green: #B3FFB3;
    --paper: #FAFAF5;
    --paper-line: rgba(100, 150, 200, 0.08);
    --red-pen: #E74C3C;
    --blue-pen: #3498DB;
  }

  body {
    font-family: 'Caveat', cursive;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    position: relative;
    /* Notebook lines */
    background-image:
      repeating-linear-gradient(
        0deg,
        var(--paper-line),
        var(--paper-line) 1px,
        transparent 1px,
        transparent 28px
      );
    background-size: 100% 28px;
  }

  /* Red margin line */
  body::before {
    content: '';
    position: fixed;
    left: 60px;
    top: 0; bottom: 0;
    width: 2px;
    background: rgba(231, 76, 60, 0.12);
    z-index: 0;
  }

  /* HEADER - like a notebook title */
  header {
    position: relative;
    z-index: 10;
    padding: 24px 32px 24px 80px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px dashed rgba(0,0,0,0.1);
  }

  .logo {
    font-family: 'Indie Flower', cursive;
    font-size: 36px;
    color: var(--ink);
    position: relative;
    transform: rotate(-2deg);
  }
  .logo-underline {
    position: absolute;
    bottom: -4px;
    left: -4px;
    right: -4px;
    height: 8px;
    background: var(--highlight-yellow);
    transform: rotate(0.5deg);
    z-index: -1;
    opacity: 0.7;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .alert-note {
    background: var(--highlight-pink);
    padding: 4px 12px;
    font-size: 18px;
    font-weight: 600;
    transform: rotate(3deg);
    box-shadow: 2px 2px 0 rgba(0,0,0,0.1);
  }
  .nav-doodle {
    font-family: 'Caveat', cursive;
    font-size: 18px;
    font-weight: 600;
    background: none;
    border: none;
    color: var(--pencil);
    cursor: pointer;
    text-decoration: underline;
    text-decoration-style: wavy;
    text-underline-offset: 4px;
    transition: color 0.2s;
  }
  .nav-doodle:hover { color: var(--ink); }

  /* MAIN */
  main {
    position: relative;
    z-index: 10;
    padding: 32px 32px 32px 80px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .section-title {
    font-family: 'Indie Flower', cursive;
    font-size: 26px;
    margin-bottom: 20px;
    position: relative;
    display: inline-block;
  }
  .section-title::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: -4px;
    right: -4px;
    height: 6px;
    background: var(--highlight-blue);
    opacity: 0.5;
    transform: rotate(-0.5deg);
  }

  /* STAT CARDS - like sticky notes */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    margin-bottom: 40px;
  }
  .stat-card {
    background: var(--paper);
    border: 2px solid var(--ink);
    border-radius: 2px;
    padding: 20px;
    position: relative;
    transform: rotate(var(--rotate, 0deg));
    box-shadow: 3px 3px 0 rgba(0,0,0,0.08);
    /* Tape effect on top */
  }
  .stat-card::before {
    content: '';
    position: absolute;
    top: -8px;
    left: 50%;
    transform: translateX(-50%) rotate(var(--tape-rotate, 0deg));
    width: 40px;
    height: 16px;
    background: rgba(255, 230, 102, 0.5);
    border: 1px solid rgba(200, 180, 50, 0.2);
  }
  .stat-card:nth-child(1) { --rotate: -1.5deg; --tape-rotate: -5deg; }
  .stat-card:nth-child(2) { --rotate: 1deg; --tape-rotate: 3deg; }
  .stat-card:nth-child(3) { --rotate: -0.5deg; --tape-rotate: -2deg; }
  .stat-card:nth-child(4) { --rotate: 1.5deg; --tape-rotate: 4deg; }

  .stat-card:nth-child(1) { border-color: var(--red-pen); }
  .stat-card:nth-child(2) { border-color: var(--blue-pen); }
  .stat-card:nth-child(3) { border-color: #27AE60; }
  .stat-card:nth-child(4) { border-color: #E67E22; }

  .stat-label {
    font-size: 16px;
    color: var(--pencil);
    margin-bottom: 4px;
    text-decoration: underline;
    text-decoration-style: wavy;
    text-underline-offset: 3px;
  }
  .stat-value {
    font-family: 'Indie Flower', cursive;
    font-size: 44px;
    font-weight: 700;
    line-height: 1;
  }
  .stat-card:nth-child(1) .stat-value { color: var(--red-pen); }
  .stat-card:nth-child(2) .stat-value { color: var(--blue-pen); }
  .stat-card:nth-child(3) .stat-value { color: #27AE60; }
  .stat-card:nth-child(4) .stat-value { color: #E67E22; }

  .stat-doodle {
    position: absolute;
    bottom: 8px;
    right: 12px;
    font-size: 24px;
    opacity: 0.3;
  }

  /* MIDDLE ROW */
  .middle-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-bottom: 40px;
  }

  .panel {
    border: 2px solid var(--ink);
    border-radius: 2px;
    padding: 24px;
    position: relative;
    background: var(--paper);
  }
  .panel::before {
    content: '';
    position: absolute;
    top: -6px;
    left: 20px;
    width: 50px;
    height: 14px;
    background: rgba(255, 230, 102, 0.5);
    border: 1px solid rgba(200, 180, 50, 0.2);
    transform: rotate(-3deg);
  }

  /* TYPE DISTRIBUTION - hand-drawn bar */
  .type-sketch {
    margin-top: 16px;
  }
  .type-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  .type-label {
    font-size: 18px;
    width: 80px;
    text-align: right;
  }
  .type-bar-track {
    flex: 1;
    height: 28px;
    position: relative;
    border: 2px solid var(--ink);
    border-radius: 2px;
    background: transparent;
  }
  .type-bar-fill {
    height: 100%;
    position: relative;
  }
  .type-bar-fill.physical {
    width: 62.5%;
    background: var(--highlight-pink);
  }
  .type-bar-fill.digital {
    width: 12.5%;
    background: var(--highlight-blue);
  }
  .type-bar-fill.subscription {
    width: 25%;
    background: var(--highlight-green);
  }
  /* Hand-drawn hatching */
  .type-bar-fill::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 3px,
      rgba(0,0,0,0.05) 3px,
      rgba(0,0,0,0.05) 6px
    );
  }
  .type-count {
    font-size: 20px;
    font-weight: 700;
    width: 24px;
  }

  /* STATUS - like a circled number */
  .status-sketch {
    margin-top: 16px;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .status-circle {
    width: 80px;
    height: 80px;
    border: 3px solid var(--ink);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Indie Flower', cursive;
    font-size: 40px;
    font-weight: 700;
    transform: rotate(-3deg);
    position: relative;
  }
  .status-circle::after {
    content: '';
    position: absolute;
    inset: -6px;
    border: 2px solid var(--ink);
    border-radius: 50%;
    opacity: 0.2;
  }
  .status-text {
    font-size: 22px;
  }
  .status-text .underline-sketch {
    text-decoration: underline;
    text-decoration-style: wavy;
    text-underline-offset: 4px;
    font-weight: 700;
  }
  .status-check {
    margin-top: 12px;
    font-size: 20px;
    color: #27AE60;
  }
  .status-check::before {
    content: '✓ ';
    font-size: 24px;
  }

  /* TREND - like a hand-drawn chart */
  .trend-panel {
    border: 2px solid var(--ink);
    border-radius: 2px;
    padding: 24px;
    position: relative;
    background: var(--paper);
  }
  .trend-panel::before {
    content: '';
    position: absolute;
    top: -6px;
    right: 30px;
    width: 50px;
    height: 14px;
    background: rgba(255, 230, 102, 0.5);
    border: 1px solid rgba(200, 180, 50, 0.2);
    transform: rotate(2deg);
  }

  .trend-header {
    display: flex;
    align-items: flex-end;
    gap: 16px;
    margin-bottom: 20px;
  }
  .trend-value {
    font-family: 'Indie Flower', cursive;
    font-size: 48px;
    font-weight: 700;
    line-height: 1;
    position: relative;
  }
  .trend-value::after {
    content: '';
    position: absolute;
    bottom: 2px;
    left: -2px;
    right: -2px;
    height: 6px;
    background: var(--highlight-yellow);
    opacity: 0.5;
    z-index: -1;
    transform: rotate(-0.5deg);
  }
  .trend-period {
    font-size: 18px;
    color: var(--pencil);
    padding-bottom: 8px;
  }

  .trend-chart {
    height: 140px;
    position: relative;
    margin-top: 16px;
  }
  .trend-chart canvas {
    width: 100%;
    height: 100%;
  }

  /* Arrow annotation */
  .annotation {
    position: absolute;
    font-size: 16px;
    color: var(--red-pen);
    transform: rotate(-5deg);
  }
  .annotation-arrow {
    font-size: 20px;
  }

  /* FOOTER */
  footer {
    position: relative;
    z-index: 10;
    padding: 16px 32px 16px 80px;
    font-size: 16px;
    color: var(--pencil);
    display: flex;
    justify-content: space-between;
    border-top: 2px dashed rgba(0,0,0,0.1);
  }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .middle-row { grid-template-columns: 1fr; }
    .stat-value { font-size: 36px; }
    .trend-value { font-size: 40px; }
    header { padding: 16px 16px 16px 40px; }
    main { padding: 20px 20px 20px 40px; }
    footer { padding: 16px 16px 16px 40px; }
    body::before { left: 30px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    MetaVault
    <div class="logo-underline"></div>
  </div>
  <div class="header-right">
    <div class="alert-note">3 未读!</div>
    <button class="nav-doodle">资产</button>
    <button class="nav-doodle">供应商</button>
    <button class="nav-doodle">设置</button>
  </div>
</header>

<main>
  <div class="section-title">资产概览</div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">资产总数</div>
      <div class="stat-value">8</div>
      <div class="stat-doodle">📦</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">供应商</div>
      <div class="stat-value">1</div>
      <div class="stat-doodle">🏪</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">资产总值</div>
      <div class="stat-value">¥5,199</div>
      <div class="stat-doodle">💰</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">即将到期</div>
      <div class="stat-value">2</div>
      <div class="stat-doodle">⏰</div>
    </div>
  </div>

  <div class="middle-row">
    <div class="panel">
      <div class="section-title">资产类型分布</div>
      <div class="type-sketch">
        <div class="type-row">
          <div class="type-label">物理</div>
          <div class="type-bar-track">
            <div class="type-bar-fill physical"></div>
          </div>
          <div class="type-count">5</div>
        </div>
        <div class="type-row">
          <div class="type-label">数字</div>
          <div class="type-bar-track">
            <div class="type-bar-fill digital"></div>
          </div>
          <div class="type-count">1</div>
        </div>
        <div class="type-row">
          <div class="type-label">订阅</div>
          <div class="type-bar-track">
            <div class="type-bar-fill subscription"></div>
          </div>
          <div class="type-count">2</div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="section-title">资产状态</div>
      <div class="status-sketch">
        <div class="status-circle">8</div>
        <div class="status-text">
          <span class="underline-sketch">使用中</span><br>
          全部活跃!
        </div>
      </div>
      <div class="status-check">没有任何闲置资产</div>
    </div>
  </div>

  <div class="trend-panel">
    <div class="section-title">订阅月费用趋势</div>
    <div class="trend-header">
      <div class="trend-value">¥298</div>
      <div class="trend-period">2026年5月</div>
    </div>
    <div class="trend-chart">
      <canvas id="trendCanvas"></canvas>
      <div class="annotation" style="right: 10%; top: 10%;">
        <span class="annotation-arrow">↗</span> 持续增长
      </div>
    </div>
  </div>
</main>

<footer>
  <span>MetaVault v0.5</span>
  <span>~ 手写涂鸦风 ~</span>
</footer>

<script>
  // Hand-drawn style chart using canvas
  const canvas = document.getElementById('trendCanvas');
  const ctx = canvas.getContext('2d');

  function resizeCanvas() {
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width * 2;
    canvas.height = rect.height * 2;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    ctx.scale(2, 2);
    drawChart();
  }

  const months = ['1月','2月','3月','4月','5月'];
  const values = [180, 220, 245, 268, 298];
  const maxVal = Math.max(...values);

  // Add slight randomness for hand-drawn feel
  function jitter(val, amount) {
    return val + (Math.random() - 0.5) * amount;
  }

  function drawChart() {
    const w = canvas.width / 2;
    const h = canvas.height / 2;
    const padding = 40;
    const chartW = w - padding * 2;
    const chartH = h - padding * 2;

    ctx.clearRect(0, 0, w, h);

    // Draw axes (hand-drawn style)
    ctx.strokeStyle = '#2C2C2C';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([]);

    // Y axis
    ctx.beginPath();
    ctx.moveTo(jitter(padding, 2), jitter(padding - 10, 2));
    for (let y = padding; y <= h - padding; y += 10) {
      ctx.lineTo(jitter(padding, 1.5), jitter(y, 1));
    }
    ctx.stroke();

    // X axis
    ctx.beginPath();
    ctx.moveTo(jitter(padding, 1), jitter(h - padding, 2));
    for (let x = padding; x <= w - padding + 10; x += 10) {
      ctx.lineTo(jitter(x, 1), jitter(h - padding, 1.5));
    }
    ctx.stroke();

    // Draw bars (sketchy style)
    const barWidth = chartW / months.length * 0.5;
    const colors = ['#FFB3C6', '#B3D9FF', '#B3FFB3', '#FFE066', '#FFB3C6'];

    values.forEach((v, i) => {
      const x = padding + (i + 0.5) * (chartW / months.length) - barWidth / 2;
      const barH = (v / maxVal) * chartH * 0.85;
      const y = h - padding - barH;

      // Fill with highlight color
      ctx.fillStyle = colors[i];
      ctx.globalAlpha = 0.6;
      ctx.fillRect(x, y, barWidth, barH);
      ctx.globalAlpha = 1;

      // Sketchy border
      ctx.strokeStyle = '#2C2C2C';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      // Top
      ctx.moveTo(jitter(x, 1), jitter(y, 1));
      ctx.lineTo(jitter(x + barWidth, 1), jitter(y, 1));
      // Right
      ctx.lineTo(jitter(x + barWidth, 1), jitter(h - padding, 1));
      // Bottom
      ctx.lineTo(jitter(x, 1), jitter(h - padding, 1));
      // Left
      ctx.lineTo(jitter(x, 1), jitter(y, 1));
      ctx.stroke();

      // Hatching inside
      ctx.strokeStyle = 'rgba(0,0,0,0.08)';
      ctx.lineWidth = 1;
      for (let lx = x; lx < x + barWidth; lx += 6) {
        ctx.beginPath();
        ctx.moveTo(jitter(lx, 0.5), jitter(y + 2, 0.5));
        ctx.lineTo(jitter(lx + 8, 0.5), jitter(h - padding - 2, 0.5));
        ctx.stroke();
      }

      // Value label
      ctx.font = '14px Caveat';
      ctx.fillStyle = '#2C2C2C';
      ctx.textAlign = 'center';
      ctx.fillText('¥' + v, x + barWidth / 2, y - 8);

      // Month label
      ctx.font = '16px Caveat';
      ctx.fillStyle = '#666';
      ctx.fillText(months[i], x + barWidth / 2, h - padding + 20);
    });
  }

  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();
</script>
</body>
</html>
