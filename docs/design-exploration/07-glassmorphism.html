<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MetaVault — Glassmorphism Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --glass-bg: rgba(255, 255, 255, 0.12);
    --glass-border: rgba(255, 255, 255, 0.18);
    --glass-blur: blur(20px) saturate(180%);
    --text-primary: rgba(255, 255, 255, 0.95);
    --text-secondary: rgba(255, 255, 255, 0.65);
    --text-muted: rgba(255, 255, 255, 0.4);
    --glow-purple: rgba(168, 85, 247, 0.6);
    --glow-blue: rgba(59, 130, 246, 0.6);
    --glow-orange: rgba(251, 146, 60, 0.5);
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    background: #0f0c1a;
    color: var(--text-primary);
    overflow-x: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Animated gradient background */
  .bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: linear-gradient(135deg, #1a0a2e 0%, #0d1b3e 40%, #1a0a2e 70%, #2d1a0a 100%);
  }

  /* Color blobs */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.7;
    z-index: 1;
    animation: blobFloat 12s ease-in-out infinite alternate;
  }
  .blob-1 {
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(168,85,247,0.8) 0%, rgba(168,85,247,0) 70%);
    top: -10%; left: -5%;
    animation-duration: 14s;
  }
  .blob-2 {
    width: 450px; height: 450px;
    background: radial-gradient(circle, rgba(59,130,246,0.7) 0%, rgba(59,130,246,0) 70%);
    top: 30%; right: -8%;
    animation-duration: 18s;
    animation-delay: -4s;
  }
  .blob-3 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(251,146,60,0.6) 0%, rgba(251,146,60,0) 70%);
    bottom: -5%; left: 30%;
    animation-duration: 16s;
    animation-delay: -8s;
  }
  .blob-4 {
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(236,72,153,0.5) 0%, rgba(236,72,153,0) 70%);
    top: 60%; left: 5%;
    animation-duration: 20s;
    animation-delay: -2s;
  }
  .blob-5 {
    width: 350px; height: 350px;
    background: radial-gradient(circle, rgba(34,211,238,0.5) 0%, rgba(34,211,238,0) 70%);
    top: 5%; right: 25%;
    animation-duration: 15s;
    animation-delay: -6s;
  }

  @keyframes blobFloat {
    0%   { transform: translate(0, 0) scale(1); }
    33%  { transform: translate(30px, -40px) scale(1.1); }
    66%  { transform: translate(-20px, 20px) scale(0.95); }
    100% { transform: translate(15px, -15px) scale(1.05); }
  }

  /* Dashboard container */
  .dashboard {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 1100px;
    padding: 32px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 36px;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .logo-icon {
    width: 44px; height: 44px;
    background: var(--glass-bg);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    border: 1px solid var(--glass-border);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    box-shadow: 0 4px 24px rgba(168,85,247,0.2);
  }
  .logo-text { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
  .logo-text span { color: rgba(168,85,247,0.9); }
  .header-right {
    display: flex; align-items: center; gap: 12px;
  }
  .glass-badge {
    background: var(--glass-bg);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 13px;
    color: var(--text-secondary);
    display: flex; align-items: center; gap: 6px;
  }
  .badge-dot {
    width: 7px; height: 7px;
    background: #f97316;
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(249,115,22,0.6);
  }

  /* Glass card base */
  .glass {
    background: var(--glass-bg);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.08);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }
  .glass:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.12);
  }

  /* KPI row */
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    margin-bottom: 24px;
  }
  .kpi-card {
    padding: 24px;
    position: relative;
    overflow: hidden;
  }
  .kpi-card::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 80px; height: 80px;
    border-radius: 50%;
    opacity: 0.15;
  }
  .kpi-card:nth-child(1)::before { background: #a855f7; }
  .kpi-card:nth-child(2)::before { background: #3b82f6; }
  .kpi-card:nth-child(3)::before { background: #22c55e; }
  .kpi-card:nth-child(4)::before { background: #f97316; }

  .kpi-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .kpi-value {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -1px;
    line-height: 1;
  }
  .kpi-card:nth-child(1) .kpi-value { color: rgba(168,85,247,0.95); }
  .kpi-card:nth-child(2) .kpi-value { color: rgba(59,130,246,0.95); }
  .kpi-card:nth-child(3) .kpi-value { color: rgba(34,197,94,0.95); }
  .kpi-card:nth-child(4) .kpi-value { color: rgba(249,115,22,0.95); }
  .kpi-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 6px;
  }

  /* Middle row */
  .mid-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 24px;
  }

  .section-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 20px;
    letter-spacing: 0.5px;
  }

  /* Asset breakdown */
  .breakdown-card { padding: 28px; }
  .breakdown-list { display: flex; flex-direction: column; gap: 16px; }
  .breakdown-item {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .breakdown-icon {
    width: 40px; height: 40px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .breakdown-icon.physical { background: rgba(168,85,247,0.2); }
  .breakdown-icon.digital { background: rgba(59,130,246,0.2); }
  .breakdown-icon.subscription { background: rgba(249,115,22,0.2); }
  .breakdown-info { flex: 1; }
  .breakdown-name { font-size: 14px; font-weight: 500; color: var(--text-primary); }
  .breakdown-desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .breakdown-bar-bg {
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    margin-top: 6px;
    overflow: hidden;
  }
  .breakdown-bar {
    height: 100%;
    border-radius: 2px;
    transition: width 0.6s ease;
  }
  .breakdown-bar.physical { width: 62.5%; background: linear-gradient(90deg, #a855f7, #c084fc); }
  .breakdown-bar.digital { width: 12.5%; background: linear-gradient(90deg, #3b82f6, #60a5fa); }
  .breakdown-bar.subscription { width: 25%; background: linear-gradient(90deg, #f97316, #fb923c); }
  .breakdown-count {
    font-size: 20px;
    font-weight: 700;
    min-width: 28px;
    text-align: right;
  }
  .breakdown-count.physical-c { color: #c084fc; }
  .breakdown-count.digital-c { color: #60a5fa; }
  .breakdown-count.subscription-c { color: #fb923c; }

  /* Donut chart card */
  .donut-card { padding: 28px; display: flex; flex-direction: column; align-items: center; }
  .donut-wrap {
    position: relative;
    width: 180px; height: 180px;
    margin-bottom: 16px;
  }
  .donut-svg { width: 180px; height: 180px; transform: rotate(-90deg); }
  .donut-center {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }
  .donut-center-value { font-size: 28px; font-weight: 700; }
  .donut-center-label { font-size: 11px; color: var(--text-muted); }
  .donut-legend {
    display: flex; gap: 16px; flex-wrap: wrap; justify-content: center;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* Bottom row */
  .bottom-row {
    display: grid;
    grid-template-columns: 1.2fr 0.8fr;
    gap: 20px;
  }

  /* Subscription card */
  .sub-card { padding: 28px; }
  .sub-main {
    display: flex;
    align-items: baseline;
    gap: 4px;
    margin-bottom: 4px;
  }
  .sub-currency { font-size: 18px; font-weight: 600; color: var(--text-secondary); }
  .sub-amount { font-size: 40px; font-weight: 700; color: rgba(251,146,60,0.95); letter-spacing: -1px; }
  .sub-period { font-size: 14px; color: var(--text-muted); }
  .sub-detail {
    display: flex; gap: 24px; margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  .sub-detail-item {}
  .sub-detail-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .sub-detail-value { font-size: 16px; font-weight: 600; margin-top: 4px; }

  /* Alerts card */
  .alert-card { padding: 28px; }
  .alert-list { display: flex; flex-direction: column; gap: 12px; }
  .alert-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px;
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .alert-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .alert-dot.urgent { background: #ef4444; box-shadow: 0 0 8px rgba(239,68,68,0.5); }
  .alert-dot.warn { background: #f59e0b; box-shadow: 0 0 8px rgba(245,158,11,0.5); }
  .alert-dot.info { background: #3b82f6; box-shadow: 0 0 8px rgba(59,130,246,0.5); }
  .alert-text { font-size: 13px; color: var(--text-secondary); flex: 1; }
  .alert-time { font-size: 11px; color: var(--text-muted); }

  /* Status row */
  .status-row {
    display: flex; gap: 12px; margin-top: 20px;
  }
  .status-pill {
    background: var(--glass-bg);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    padding: 10px 18px;
    font-size: 13px;
    color: var(--text-secondary);
    display: flex; align-items: center; gap: 8px;
    flex: 1;
    justify-content: center;
  }
  .status-pill strong { color: var(--text-primary); font-weight: 600; }

  @media (max-width: 768px) {
    .dashboard { padding: 16px; }
    .kpi-row { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .mid-row, .bottom-row { grid-template-columns: 1fr; }
    .kpi-value { font-size: 24px; }
    .sub-amount { font-size: 32px; }
  }
</style>
</head>
<body>

<div class="bg-canvas"></div>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>
<div class="blob blob-4"></div>
<div class="blob blob-5"></div>

<div class="dashboard">
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="logo-icon">💎</div>
      <div class="logo-text">Meta<span>Vault</span></div>
    </div>
    <div class="header-right">
      <div class="glass-badge">
        <div class="badge-dot"></div>
        3 条未读提醒
      </div>
      <div class="glass-badge">2026年5月</div>
    </div>
  </header>

  <!-- KPI Row -->
  <div class="kpi-row">
    <div class="glass kpi-card">
      <div class="kpi-label">资产总数</div>
      <div class="kpi-value">8</div>
      <div class="kpi-sub">使用中 8</div>
    </div>
    <div class="glass kpi-card">
      <div class="kpi-label">供应商</div>
      <div class="kpi-value">1</div>
      <div class="kpi-sub">已收藏</div>
    </div>
    <div class="glass kpi-card">
      <div class="kpi-label">资产总值</div>
      <div class="kpi-value">¥5,199</div>
      <div class="kpi-sub">全部资产</div>
    </div>
    <div class="glass kpi-card">
      <div class="kpi-label">即将到期</div>
      <div class="kpi-value">2</div>
      <div class="kpi-sub">需关注</div>
    </div>
  </div>

  <!-- Middle Row -->
  <div class="mid-row">
    <!-- Asset Breakdown -->
    <div class="glass breakdown-card">
      <div class="section-title">资产构成</div>
      <div class="breakdown-list">
        <div class="breakdown-item">
          <div class="breakdown-icon physical">📦</div>
          <div class="breakdown-info">
            <div class="breakdown-name">物理资产</div>
            <div class="breakdown-desc">硬件设备、实体物品</div>
            <div class="breakdown-bar-bg"><div class="breakdown-bar physical"></div></div>
          </div>
          <div class="breakdown-count physical-c">5</div>
        </div>
        <div class="breakdown-item">
          <div class="breakdown-icon digital">💻</div>
          <div class="breakdown-info">
            <div class="breakdown-name">数字资产</div>
            <div class="breakdown-desc">软件许可、数字内容</div>
            <div class="breakdown-bar-bg"><div class="breakdown-bar digital"></div></div>
          </div>
          <div class="breakdown-count digital-c">1</div>
        </div>
        <div class="breakdown-item">
          <div class="breakdown-icon subscription">🔄</div>
          <div class="breakdown-info">
            <div class="breakdown-name">订阅服务</div>
            <div class="breakdown-desc">SaaS、定期续费</div>
            <div class="breakdown-bar-bg"><div class="breakdown-bar subscription"></div></div>
          </div>
          <div class="breakdown-count subscription-c">2</div>
        </div>
      </div>
    </div>

    <!-- Donut Chart -->
    <div class="glass donut-card">
      <div class="section-title">资产分布</div>
      <div class="donut-wrap">
        <svg class="donut-svg" viewBox="0 0 180 180">
          <!-- Physical: 5/8 = 62.5% => circumference=2*pi*70=440, dash=440*0.625=275 -->
          <circle cx="90" cy="90" r="70" fill="none" stroke="rgba(168,85,247,0.8)" stroke-width="20"
            stroke-dasharray="275 440" stroke-dashoffset="0" stroke-linecap="round"/>
          <!-- Digital: 1/8 = 12.5% => dash=55 -->
          <circle cx="90" cy="90" r="70" fill="none" stroke="rgba(59,130,246,0.8)" stroke-width="20"
            stroke-dasharray="55 440" stroke-dashoffset="-275" stroke-linecap="round"/>
          <!-- Subscription: 2/8 = 25% => dash=110 -->
          <circle cx="90" cy="90" r="70" fill="none" stroke="rgba(249,115,22,0.8)" stroke-width="20"
            stroke-dasharray="110 440" stroke-dashoffset="-330" stroke-linecap="round"/>
        </svg>
        <div class="donut-center">
          <div class="donut-center-value">8</div>
          <div class="donut-center-label">总资产</div>
        </div>
      </div>
      <div class="donut-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#a855f7"></div>物理 62.5%</div>
        <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div>数字 12.5%</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f97316"></div>订阅 25%</div>
      </div>
    </div>
  </div>

  <!-- Bottom Row -->
  <div class="bottom-row">
    <!-- Subscription Cost -->
    <div class="glass sub-card">
      <div class="section-title">订阅费用</div>
      <div class="sub-main">
        <span class="sub-currency">¥</span>
        <span class="sub-amount">298</span>
        <span class="sub-period">/月</span>
      </div>
      <div class="sub-detail">
        <div class="sub-detail-item">
          <div class="sub-detail-label">年化费用</div>
          <div class="sub-detail-value">¥3,576</div>
        </div>
        <div class="sub-detail-item">
          <div class="sub-detail-label">订阅数</div>
          <div class="sub-detail-value">2</div>
        </div>
        <div class="sub-detail-item">
          <div class="sub-detail-label">即将到期</div>
          <div class="sub-detail-value" style="color:#f97316">2</div>
        </div>
      </div>
    </div>

    <!-- Alerts -->
    <div class="glass alert-card">
      <div class="section-title">最近提醒</div>
      <div class="alert-list">
        <div class="alert-item">
          <div class="alert-dot urgent"></div>
          <div class="alert-text">Adobe CC 即将到期</div>
          <div class="alert-time">3天后</div>
        </div>
        <div class="alert-item">
          <div class="alert-dot warn"></div>
          <div class="alert-text">iCloud+ 续费提醒</div>
          <div class="alert-time">7天后</div>
        </div>
        <div class="alert-item">
          <div class="alert-dot info"></div>
          <div class="alert-text">新供应商评价待完成</div>
          <div class="alert-time">今天</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Status Row -->
  <div class="status-row">
    <div class="status-pill">使用率 <strong>100%</strong></div>
    <div class="status-pill">健康度 <strong>良好</strong></div>
    <div class="status-pill">未读 <strong>3</strong></div>
    <div class="status-pill">月费 <strong>¥298</strong></div>
  </div>
</div>

</body>
</html>
