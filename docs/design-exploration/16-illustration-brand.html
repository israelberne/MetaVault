<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MetaVault — Illustration Brand</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --brand-coral: #FF6B6B;
    --brand-teal: #4ECDC4;
    --brand-yellow: #FFE66D;
    --brand-lavender: #A78BFA;
    --brand-peach: #FFAB91;
    --bg-cream: #FFF8F0;
    --bg-white: #FFFFFF;
    --text-dark: #2D3436;
    --text-muted: #636E72;
    --card-shadow: 0 4px 20px rgba(0,0,0,0.06);
    --card-shadow-hover: 0 8px 30px rgba(0,0,0,0.1);
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg-cream);
    color: var(--text-dark);
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  /* Decorative background shapes */
  .bg-decor {
    position: fixed;
    pointer-events: none;
    z-index: 0;
  }
  .bg-decor-1 {
    top: -80px; right: -80px;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(78, 205, 196, 0.08), transparent 70%);
  }
  .bg-decor-2 {
    bottom: -60px; left: -60px;
    width: 250px; height: 250px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255, 107, 107, 0.08), transparent 70%);
  }
  .bg-decor-3 {
    top: 40%; left: 50%;
    width: 200px; height: 200px;
    border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
    background: rgba(255, 230, 109, 0.06);
    animation: morphShape 12s ease-in-out infinite;
  }
  @keyframes morphShape {
    0%, 100% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
    50% { border-radius: 70% 30% 30% 70% / 70% 70% 30% 30%; }
  }

  /* HEADER */
  header {
    position: relative;
    z-index: 10;
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg-white);
    border-bottom: 2px solid rgba(78, 205, 196, 0.15);
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-icon {
    width: 40px; height: 40px;
    position: relative;
  }
  .logo-icon svg { width: 100%; height: 100%; }

  .logo-text {
    font-family: 'Quicksand', sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--text-dark);
  }
  .logo-text span { color: var(--brand-coral); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .alert-bubble {
    background: var(--brand-coral);
    color: white;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    position: relative;
  }
  .alert-bubble::after {
    content: '';
    position: absolute;
    top: -2px; right: -2px;
    width: 10px; height: 10px;
    background: var(--brand-yellow);
    border-radius: 50%;
    border: 2px solid white;
  }

  .nav-pill {
    padding: 8px 18px;
    border-radius: 24px;
    border: 2px solid rgba(78, 205, 196, 0.2);
    background: transparent;
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.3s;
  }
  .nav-pill:hover {
    background: var(--brand-teal);
    color: white;
    border-color: var(--brand-teal);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(78, 205, 196, 0.3);
  }
  .nav-pill.active {
    background: var(--brand-teal);
    color: white;
    border-color: var(--brand-teal);
  }

  /* MAIN */
  main {
    position: relative;
    z-index: 10;
    padding: 32px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .section-title {
    font-family: 'Quicksand', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text-dark);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title .emoji { font-size: 22px; }

  /* STAT CARDS */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    margin-bottom: 32px;
  }
  .stat-card {
    background: var(--bg-white);
    border-radius: 20px;
    padding: 24px;
    box-shadow: var(--card-shadow);
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }
  .stat-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--card-shadow-hover);
  }
  .stat-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 4px;
    border-radius: 0 0 20px 20px;
  }
  .stat-card:nth-child(1)::after { background: var(--brand-coral); }
  .stat-card:nth-child(2)::after { background: var(--brand-teal); }
  .stat-card:nth-child(3)::after { background: var(--brand-lavender); }
  .stat-card:nth-child(4)::after { background: var(--brand-yellow); }

  .stat-illustration {
    width: 56px; height: 56px;
    margin-bottom: 12px;
  }
  .stat-illustration svg { width: 100%; height: 100%; }

  .stat-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .stat-value {
    font-family: 'Quicksand', sans-serif;
    font-size: 32px;
    font-weight: 700;
    line-height: 1.1;
  }
  .stat-card:nth-child(1) .stat-value { color: var(--brand-coral); }
  .stat-card:nth-child(2) .stat-value { color: var(--brand-teal); }
  .stat-card:nth-child(3) .stat-value { color: var(--brand-lavender); }
  .stat-card:nth-child(4) .stat-value { color: #E6A800; }

  /* MIDDLE ROW */
  .middle-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 32px;
  }

  .panel {
    background: var(--bg-white);
    border-radius: 24px;
    padding: 28px;
    box-shadow: var(--card-shadow);
  }

  /* TYPE DISTRIBUTION - friendly donut-like */
  .type-cards {
    display: flex;
    gap: 16px;
    margin-top: 16px;
  }
  .type-card {
    flex: 1;
    border-radius: 16px;
    padding: 16px;
    text-align: center;
    transition: all 0.3s;
    cursor: default;
  }
  .type-card:hover { transform: scale(1.05); }
  .type-card.physical {
    background: rgba(255, 107, 107, 0.08);
    border: 2px solid rgba(255, 107, 107, 0.2);
  }
  .type-card.digital {
    background: rgba(167, 139, 250, 0.08);
    border: 2px solid rgba(167, 139, 250, 0.2);
  }
  .type-card.subscription {
    background: rgba(78, 205, 196, 0.08);
    border: 2px solid rgba(78, 205, 196, 0.2);
  }

  .type-card-icon {
    width: 40px; height: 40px;
    margin: 0 auto 8px;
  }
  .type-card-icon svg { width: 100%; height: 100%; }

  .type-card-value {
    font-family: 'Quicksand', sans-serif;
    font-size: 28px;
    font-weight: 700;
    line-height: 1;
  }
  .type-card.physical .type-card-value { color: var(--brand-coral); }
  .type-card.digital .type-card-value { color: var(--brand-lavender); }
  .type-card.subscription .type-card-value { color: var(--brand-teal); }

  .type-card-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* STATUS */
  .status-visual {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-top: 16px;
  }
  .status-face {
    width: 80px; height: 80px;
    position: relative;
  }
  .status-face svg { width: 100%; height: 100%; }

  .status-info {
    flex: 1;
  }
  .status-big-number {
    font-family: 'Quicksand', sans-serif;
    font-size: 48px;
    font-weight: 700;
    color: var(--brand-teal);
    line-height: 1;
  }
  .status-label {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .status-bar-track {
    width: 100%;
    height: 12px;
    background: rgba(78, 205, 196, 0.1);
    border-radius: 6px;
    margin-top: 12px;
    overflow: hidden;
  }
  .status-bar-fill {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, var(--brand-teal), var(--brand-coral));
    border-radius: 6px;
    position: relative;
  }
  .status-bar-fill::after {
    content: '100%';
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 9px;
    font-weight: 800;
    color: white;
  }

  /* TREND */
  .trend-panel {
    background: var(--bg-white);
    border-radius: 24px;
    padding: 28px;
    box-shadow: var(--card-shadow);
  }
  .trend-header {
    display: flex;
    align-items: flex-end;
    gap: 16px;
    margin-bottom: 24px;
  }
  .trend-value {
    font-family: 'Quicksand', sans-serif;
    font-size: 40px;
    font-weight: 700;
    color: var(--brand-coral);
    line-height: 1;
  }
  .trend-period {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    padding-bottom: 6px;
  }

  .trend-chart {
    height: 140px;
    display: flex;
    align-items: flex-end;
    gap: 16px;
    padding: 0 8px;
  }
  .chart-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .chart-bar {
    width: 100%;
    max-width: 52px;
    border-radius: 12px 12px 6px 6px;
    transition: all 0.3s;
    cursor: default;
    position: relative;
  }
  .chart-bar.c1 { background: linear-gradient(180deg, var(--brand-coral), var(--brand-peach)); }
  .chart-bar.c2 { background: linear-gradient(180deg, var(--brand-teal), #A8E6CF); }
  .chart-bar.c3 { background: linear-gradient(180deg, var(--brand-lavender), #D4BBFF); }
  .chart-bar.c4 { background: linear-gradient(180deg, var(--brand-yellow), #FFF3B0); }
  .chart-bar.c5 { background: linear-gradient(180deg, var(--brand-coral), var(--brand-peach)); }

  .chart-bar:hover {
    transform: scaleY(1.08);
    transform-origin: bottom;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  }
  .chart-bar-value {
    position: absolute;
    top: -22px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Quicksand', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .chart-bar:hover .chart-bar-value { opacity: 1; }
  .chart-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
  }

  /* FOOTER */
  footer {
    position: relative;
    z-index: 10;
    padding: 16px 32px;
    font-size: 12px;
    font-weight: 600;
    color: rgba(99, 110, 114, 0.4);
    display: flex;
    justify-content: space-between;
  }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .middle-row { grid-template-columns: 1fr; }
    .stat-value { font-size: 26px; }
    .trend-value { font-size: 32px; }
    header { padding: 16px; flex-wrap: wrap; gap: 12px; }
    main { padding: 20px; }
    .type-cards { flex-direction: column; }
    .status-visual { flex-direction: column; text-align: center; }
  }
</style>
</head>
<body>

<div class="bg-decor bg-decor-1"></div>
<div class="bg-decor bg-decor-2"></div>
<div class="bg-decor bg-decor-3"></div>

<header>
  <div class="logo-area">
    <div class="logo-icon">
      <svg viewBox="0 0 40 40" fill="none">
        <rect x="4" y="8" width="32" height="24" rx="4" fill="#4ECDC4" opacity="0.2" stroke="#4ECDC4" stroke-width="2"/>
        <circle cx="14" cy="20" r="4" fill="#FF6B6B"/>
        <rect x="22" y="14" width="10" height="3" rx="1.5" fill="#A78BFA"/>
        <rect x="22" y="20" width="8" height="3" rx="1.5" fill="#FFE66D"/>
        <rect x="22" y="26" width="6" height="3" rx="1.5" fill="#4ECDC4"/>
      </svg>
    </div>
    <div class="logo-text">Meta<span>Vault</span></div>
  </div>
  <div class="header-right">
    <div class="alert-bubble">3 未读</div>
    <button class="nav-pill active">资产</button>
    <button class="nav-pill">供应商</button>
    <button class="nav-pill">设置</button>
  </div>
</header>

<main>
  <div class="section-title"><span class="emoji">📊</span> 资产概览</div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-illustration">
        <svg viewBox="0 0 56 56" fill="none">
          <rect x="8" y="16" width="40" height="30" rx="6" fill="#FF6B6B" opacity="0.15" stroke="#FF6B6B" stroke-width="2"/>
          <rect x="14" y="10" width="28" height="6" rx="3" fill="#FF6B6B" opacity="0.3"/>
          <circle cx="28" cy="31" r="6" fill="#FF6B6B" opacity="0.4"/>
          <path d="M26 31L28 33L32 29" stroke="#FF6B6B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="stat-label">资产总数</div>
      <div class="stat-value">8</div>
    </div>
    <div class="stat-card">
      <div class="stat-illustration">
        <svg viewBox="0 0 56 56" fill="none">
          <rect x="10" y="20" width="36" height="22" rx="4" fill="#4ECDC4" opacity="0.15" stroke="#4ECDC4" stroke-width="2"/>
          <circle cx="20" cy="31" r="5" fill="#4ECDC4" opacity="0.4"/>
          <circle cx="36" cy="31" r="5" fill="#4ECDC4" opacity="0.4"/>
          <path d="M20 28V34M36 28V34" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="stat-label">供应商</div>
      <div class="stat-value">1</div>
    </div>
    <div class="stat-card">
      <div class="stat-illustration">
        <svg viewBox="0 0 56 56" fill="none">
          <circle cx="28" cy="28" r="16" fill="#A78BFA" opacity="0.15" stroke="#A78BFA" stroke-width="2"/>
          <text x="28" y="33" text-anchor="middle" font-size="16" font-weight="700" fill="#A78BFA">¥</text>
        </svg>
      </div>
      <div class="stat-label">资产总值</div>
      <div class="stat-value">¥5,199</div>
    </div>
    <div class="stat-card">
      <div class="stat-illustration">
        <svg viewBox="0 0 56 56" fill="none">
          <circle cx="28" cy="28" r="16" fill="#FFE66D" opacity="0.2" stroke="#E6A800" stroke-width="2"/>
          <path d="M28 18V28L34 32" stroke="#E6A800" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="28" cy="28" r="2" fill="#E6A800"/>
        </svg>
      </div>
      <div class="stat-label">即将到期</div>
      <div class="stat-value">2</div>
    </div>
  </div>

  <div class="middle-row">
    <div class="panel">
      <div class="section-title"><span class="emoji">🗂️</span> 资产类型分布</div>
      <div class="type-cards">
        <div class="type-card physical">
          <div class="type-card-icon">
            <svg viewBox="0 0 40 40" fill="none">
              <rect x="6" y="10" width="28" height="22" rx="4" fill="#FF6B6B" opacity="0.3" stroke="#FF6B6B" stroke-width="1.5"/>
              <rect x="10" y="6" width="20" height="4" rx="2" fill="#FF6B6B" opacity="0.5"/>
            </svg>
          </div>
          <div class="type-card-value">5</div>
          <div class="type-card-label">物理资产</div>
        </div>
        <div class="type-card digital">
          <div class="type-card-icon">
            <svg viewBox="0 0 40 40" fill="none">
              <rect x="8" y="8" width="24" height="24" rx="4" fill="#A78BFA" opacity="0.3" stroke="#A78BFA" stroke-width="1.5"/>
              <path d="M16 20L20 24L28 16" stroke="#A78BFA" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="type-card-value">1</div>
          <div class="type-card-label">数字资产</div>
        </div>
        <div class="type-card subscription">
          <div class="type-card-icon">
            <svg viewBox="0 0 40 40" fill="none">
              <circle cx="20" cy="20" r="12" fill="#4ECDC4" opacity="0.3" stroke="#4ECDC4" stroke-width="1.5"/>
              <path d="M20 14V20L24 22" stroke="#4ECDC4" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="type-card-value">2</div>
          <div class="type-card-label">订阅</div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="section-title"><span class="emoji">✨</span> 资产状态</div>
      <div class="status-visual">
        <div class="status-face">
          <svg viewBox="0 0 80 80" fill="none">
            <circle cx="40" cy="40" r="36" fill="#4ECDC4" opacity="0.15" stroke="#4ECDC4" stroke-width="2"/>
            <circle cx="30" cy="34" r="4" fill="#4ECDC4"/>
            <circle cx="50" cy="34" r="4" fill="#4ECDC4"/>
            <path d="M28 48Q40 58 52 48" stroke="#4ECDC4" stroke-width="2.5" stroke-linecap="round" fill="none"/>
          </svg>
        </div>
        <div class="status-info">
          <div class="status-big-number">8</div>
          <div class="status-label">使用中</div>
          <div class="status-bar-track">
            <div class="status-bar-fill"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="trend-panel">
    <div class="section-title"><span class="emoji">📈</span> 订阅月费用趋势</div>
    <div class="trend-header">
      <div class="trend-value">¥298</div>
      <div class="trend-period">2026年5月</div>
    </div>
    <div class="trend-chart" id="trendChart"></div>
  </div>
</main>

<footer>
  <span>MetaVault v0.5</span>
  <span>Illustration Brand Style</span>
</footer>

<script>
  const months = ['1月','2月','3月','4月','5月'];
  const values = [180, 220, 245, 268, 298];
  const maxVal = Math.max(...values);
  const chartEl = document.getElementById('trendChart');
  const colorClasses = ['c1','c2','c3','c4','c5'];

  values.forEach((v, i) => {
    const col = document.createElement('div');
    col.className = 'chart-col';

    const bar = document.createElement('div');
    bar.className = 'chart-bar ' + colorClasses[i];
    bar.style.height = (v / maxVal * 90) + '%';

    const val = document.createElement('div');
    val.className = 'chart-bar-value';
    val.textContent = '¥' + v;
    bar.appendChild(val);

    const label = document.createElement('div');
    label.className = 'chart-label';
    label.textContent = months[i];

    col.appendChild(bar);
    col.appendChild(label);
    chartEl.appendChild(col);
  });
</script>
</body>
</html>
