<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MetaVault — Fullscreen Visual</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-dark: #08080a;
    --text: #f5f5f7;
    --text-dim: rgba(245, 245, 247, 0.5);
    --accent: #2997ff;
    --accent-warm: #ff9f43;
    --accent-green: #30d158;
    --accent-red: #ff453a;
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg-dark);
    color: var(--text);
    overflow-x: hidden;
  }

  /* Scroll container with snap */
  .scroll-container {
    height: 100vh;
    overflow-y: auto;
    scroll-snap-type: y mandatory;
    scroll-behavior: smooth;
  }

  /* Each section is a full-screen panel */
  .panel {
    min-height: 100vh;
    scroll-snap-align: start;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* === PANEL 1: Hero === */
  .panel--hero {
    background: linear-gradient(180deg, #08080a 0%, #0f1a2e 100%);
    padding: 0 80px;
    align-items: flex-start;
  }

  .panel--hero::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(41, 151, 255, 0.12), transparent 70%);
    top: 10%; right: -5%;
    filter: blur(60px);
  }

  .panel--hero::after {
    content: '';
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255, 159, 67, 0.08), transparent 70%);
    bottom: 10%; left: -5%;
    filter: blur(60px);
  }

  .hero__brand {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 60px;
    position: relative;
    z-index: 1;
  }

  .hero__brand span { color: var(--accent); }

  .hero__headline {
    font-size: 80px;
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: -2px;
    max-width: 800px;
    position: relative;
    z-index: 1;
    margin-bottom: 24px;
  }

  .hero__headline em {
    font-style: normal;
    background: linear-gradient(135deg, var(--accent), #64d2ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero__sub {
    font-size: 18px;
    font-weight: 300;
    color: var(--text-dim);
    max-width: 500px;
    line-height: 1.6;
    position: relative;
    z-index: 1;
    margin-bottom: 40px;
  }

  .hero__scroll-hint {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--text-dim);
    animation: float 3s ease-in-out infinite;
  }

  .scroll-line {
    width: 1px;
    height: 32px;
    background: linear-gradient(to bottom, var(--text-dim), transparent);
  }

  @keyframes float {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(8px); }
  }

  /* === PANEL 2: Stats === */
  .panel--stats {
    background: var(--bg-dark);
    padding: 60px 80px;
  }

  .panel--stats::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(41, 151, 255, 0.03) 0%, transparent 50%, rgba(48, 209, 88, 0.03) 100%);
  }

  .stats-panel__label {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 48px;
    position: relative;
    z-index: 1;
  }

  .stats-grid-full {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 32px;
    position: relative;
    z-index: 1;
  }

  .full-stat {
    padding: 32px;
    border-radius: 24px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.06);
    position: relative;
    overflow: hidden;
  }

  .full-stat::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 24px 24px 0 0;
  }

  .full-stat--cyan::before { background: linear-gradient(90deg, var(--accent), #64d2ff); }
  .full-stat--green::before { background: linear-gradient(90deg, var(--accent-green), #63e6be); }
  .full-stat--warm::before { background: linear-gradient(90deg, var(--accent-warm), #ffd60a); }
  .full-stat--red::before { background: linear-gradient(90deg, var(--accent-red), #ff6b6b); }

  .full-stat__icon {
    width: 48px; height: 48px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    margin-bottom: 20px;
  }

  .full-stat--cyan .full-stat__icon { background: rgba(41, 151, 255, 0.1); }
  .full-stat--green .full-stat__icon { background: rgba(48, 209, 88, 0.1); }
  .full-stat--warm .full-stat__icon { background: rgba(255, 159, 67, 0.1); }
  .full-stat--red .full-stat__icon { background: rgba(255, 69, 58, 0.1); }

  .full-stat__value {
    font-size: 52px;
    font-weight: 800;
    letter-spacing: -2px;
    line-height: 1;
    margin-bottom: 8px;
  }

  .full-stat--cyan .full-stat__value { color: var(--accent); }
  .full-stat--green .full-stat__value { color: var(--accent-green); }
  .full-stat--warm .full-stat__value { color: var(--accent-warm); }
  .full-stat--red .full-stat__value { color: var(--accent-red); }

  .full-stat__label {
    font-size: 14px;
    font-weight: 400;
    color: var(--text-dim);
  }

  /* === PANEL 3: Type + Status === */
  .panel--breakdown {
    background: linear-gradient(180deg, #08080a 0%, #0a0f1a 50%, #08080a 100%);
    padding: 60px 80px;
  }

  .breakdown-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 60px;
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    width: 100%;
  }

  .breakdown-section__title {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 36px;
  }

  .type-visual {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .type-row {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .type-row__bar {
    flex: 1;
    height: 48px;
    border-radius: 12px;
    position: relative;
    overflow: hidden;
    background: rgba(255, 255, 255, 0.03);
  }

  .type-row__fill {
    height: 100%;
    border-radius: 12px;
    display: flex;
    align-items: center;
    padding: 0 16px;
    font-size: 14px;
    font-weight: 600;
    transition: width 1.5s ease;
  }

  .type-row__fill--cyan { background: linear-gradient(90deg, rgba(41,151,255,0.2), rgba(41,151,255,0.35)); color: #64d2ff; }
  .type-row__fill--violet { background: linear-gradient(90deg, rgba(175,130,255,0.2), rgba(175,130,255,0.35)); color: #bf9fff; }
  .type-row__fill--warm { background: linear-gradient(90deg, rgba(255,159,67,0.2), rgba(255,159,67,0.35)); color: #ffbf69; }

  .type-row__count {
    font-size: 28px;
    font-weight: 800;
    width: 50px;
    text-align: right;
    letter-spacing: -1px;
  }

  .type-row__count--cyan { color: var(--accent); }
  .type-row__count--violet { color: #af82ff; }
  .type-row__count--warm { color: var(--accent-warm); }

  .status-visual {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }

  .status-ring-lg {
    width: 200px; height: 200px;
    position: relative;
  }

  .status-ring-lg svg { width: 100%; height: 100%; }

  .status-ring-lg__center {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }

  .status-ring-lg__pct {
    font-size: 42px;
    font-weight: 800;
    line-height: 1;
    color: var(--accent-green);
  }

  .status-ring-lg__label {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .status-summary { text-align: center; }

  .status-summary__item {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 14px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .status-summary__dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }

  /* === PANEL 4: Subscription === */
  .panel--subscription {
    background: linear-gradient(180deg, #08080a 0%, #1a0f00 100%);
    padding: 60px 80px;
    position: relative;
  }

  .panel--subscription::before {
    content: '';
    position: absolute;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255, 159, 67, 0.08), transparent 70%);
    top: 20%; right: 5%;
    filter: blur(80px);
  }

  .sub-content {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    width: 100%;
  }

  .sub-title {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 16px;
  }

  .sub-big {
    font-size: 96px;
    font-weight: 900;
    letter-spacing: -3px;
    line-height: 1;
    margin-bottom: 8px;
  }

  .sub-big__symbol {
    font-weight: 200;
    font-size: 56px;
    color: var(--text-dim);
  }

  .sub-big__value {
    background: linear-gradient(135deg, var(--accent-warm), #ffd60a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .sub-period {
    font-size: 16px;
    color: var(--text-dim);
    font-weight: 300;
    margin-bottom: 40px;
  }

  .sub-chart { width: 100%; height: 140px; }

  /* === PANEL 5: Closing === */
  .panel--closing {
    background: linear-gradient(180deg, #08080a 0%, #0a1628 100%);
    padding: 60px 80px;
    align-items: center;
    text-align: center;
  }

  .panel--closing::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(41, 151, 255, 0.06), transparent 70%);
    top: 30%; left: 50%;
    transform: translateX(-50%);
    filter: blur(60px);
  }

  .closing__brand {
    font-size: 48px;
    font-weight: 800;
    letter-spacing: 4px;
    position: relative;
    z-index: 1;
    margin-bottom: 20px;
  }

  .closing__brand span { color: var(--accent); }

  .closing__tagline {
    font-size: 16px;
    font-weight: 300;
    color: var(--text-dim);
    position: relative;
    z-index: 1;
    max-width: 400px;
    line-height: 1.6;
    margin-bottom: 32px;
  }

  .closing__alerts {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 12px 24px;
    border-radius: 100px;
    background: rgba(255, 69, 58, 0.08);
    border: 1px solid rgba(255, 69, 58, 0.2);
    font-size: 14px;
    color: var(--accent-red);
    position: relative;
    z-index: 1;
  }

  .closing__alerts-dot {
    width: 8px; height: 8px;
    background: var(--accent-red);
    border-radius: 50%;
    animation: blink 2s ease infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Side navigation dots */
  .nav-dots {
    position: fixed;
    right: 24px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 12px;
    z-index: 100;
  }

  .nav-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.2);
    cursor: pointer;
    transition: background 0.3s ease, transform 0.3s ease;
  }

  .nav-dot:hover { background: rgba(255, 255, 255, 0.5); transform: scale(1.3); }

  @media (max-width: 768px) {
    .panel { padding: 40px 24px; }
    .hero__headline { font-size: 44px; }
    .stats-grid-full { grid-template-columns: repeat(2, 1fr); gap: 16px; }
    .full-stat__value { font-size: 36px; }
    .breakdown-grid { grid-template-columns: 1fr; gap: 40px; }
    .sub-big { font-size: 56px; }
    .sub-big__symbol { font-size: 36px; }
    .closing__brand { font-size: 32px; }
  }
</style>
</head>
<body>

<div class="nav-dots">
  <div class="nav-dot" onclick="document.querySelector('.panel--hero').scrollIntoView({behavior:'smooth'})"></div>
  <div class="nav-dot" onclick="document.querySelector('.panel--stats').scrollIntoView({behavior:'smooth'})"></div>
  <div class="nav-dot" onclick="document.querySelector('.panel--breakdown').scrollIntoView({behavior:'smooth'})"></div>
  <div class="nav-dot" onclick="document.querySelector('.panel--subscription').scrollIntoView({behavior:'smooth'})"></div>
  <div class="nav-dot" onclick="document.querySelector('.panel--closing').scrollIntoView({behavior:'smooth'})"></div>
</div>

<div class="scroll-container">

  <!-- Panel 1: Hero -->
  <section class="panel panel--hero">
    <div class="hero__brand">META<span>VAULT</span></div>
    <div class="hero__headline">
      管理你的<br><em>每一项资产</em>
    </div>
    <div class="hero__sub">
      8 项资产 · ¥5,199 总值 · 1 家供应商<br>
      全部使用中，2 项即将到期
    </div>
    <div class="hero__scroll-hint">
      <span>SCROLL</span>
      <div class="scroll-line"></div>
    </div>
  </section>

  <!-- Panel 2: Stats -->
  <section class="panel panel--stats">
    <div class="stats-panel__label">数据总览</div>
    <div class="stats-grid-full">
      <div class="full-stat full-stat--cyan">
        <div class="full-stat__icon">📦</div>
        <div class="full-stat__value">8</div>
        <div class="full-stat__label">资产总数</div>
      </div>
      <div class="full-stat full-stat--green">
        <div class="full-stat__icon">🏢</div>
        <div class="full-stat__value">1</div>
        <div class="full-stat__label">供应商</div>
      </div>
      <div class="full-stat full-stat--warm">
        <div class="full-stat__icon">💰</div>
        <div class="full-stat__value">¥5,199</div>
        <div class="full-stat__label">资产总值</div>
      </div>
      <div class="full-stat full-stat--red">
        <div class="full-stat__icon">⏰</div>
        <div class="full-stat__value">2</div>
        <div class="full-stat__label">即将到期</div>
      </div>
    </div>
  </section>

  <!-- Panel 3: Type + Status -->
  <section class="panel panel--breakdown">
    <div class="breakdown-grid">
      <div>
        <div class="breakdown-section__title">资产类型分布</div>
        <div class="type-visual">
          <div class="type-row">
            <div class="type-row__bar">
              <div class="type-row__fill type-row__fill--cyan" style="width:62.5%">物理资产</div>
            </div>
            <div class="type-row__count type-row__count--cyan">5</div>
          </div>
          <div class="type-row">
            <div class="type-row__bar">
              <div class="type-row__fill type-row__fill--violet" style="width:12.5%">数字资产</div>
            </div>
            <div class="type-row__count type-row__count--violet">1</div>
          </div>
          <div class="type-row">
            <div class="type-row__bar">
              <div class="type-row__fill type-row__fill--warm" style="width:25%">订阅</div>
            </div>
            <div class="type-row__count type-row__count--warm">2</div>
          </div>
        </div>
      </div>
      <div>
        <div class="breakdown-section__title">资产状态</div>
        <div class="status-visual">
          <div class="status-ring-lg">
            <svg viewBox="0 0 200 200">
              <circle cx="100" cy="100" r="80" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="12"/>
              <circle cx="100" cy="100" r="80" fill="none" stroke="var(--accent-green)" stroke-width="12"
                stroke-dasharray="502.65 502.65" stroke-dashoffset="0"
                transform="rotate(-90 100 100)" stroke-linecap="round"
                style="filter: drop-shadow(0 0 8px rgba(48,209,88,0.4))"/>
            </svg>
            <div class="status-ring-lg__center">
              <div class="status-ring-lg__pct">100%</div>
              <div class="status-ring-lg__label">使用中</div>
            </div>
          </div>
          <div class="status-summary">
            <div class="status-summary__item">
              <div class="status-summary__dot" style="background:var(--accent-green)"></div>
              使用中 8
            </div>
            <div class="status-summary__item">
              <div class="status-summary__dot" style="background:rgba(255,255,255,0.15)"></div>
              闲置 0 · 已处置 0
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Panel 4: Subscription -->
  <section class="panel panel--subscription">
    <div class="sub-content">
      <div class="sub-title">订阅月费用趋势</div>
      <div class="sub-big">
        <span class="sub-big__symbol">¥</span><span class="sub-big__value">298</span>
      </div>
      <div class="sub-period">2026年5月 · Monthly Recurring</div>
      <svg class="sub-chart" viewBox="0 0 600 140">
        <defs>
          <linearGradient id="subArea" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#ff9f43" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#ff9f43" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <path d="M0,120 L0,110 C50,108 100,100 150,90 C200,80 250,68 300,58 C350,50 400,40 450,35 C500,32 550,28 600,25 L600,140 L0,140 Z" fill="url(#subArea)"/>
        <path d="M0,110 C50,108 100,100 150,90 C200,80 250,68 300,58 C350,50 400,40 450,35 C500,32 550,28 600,25" fill="none" stroke="#ff9f43" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="600" cy="25" r="6" fill="#ff9f43" style="filter: drop-shadow(0 0 8px rgba(255,159,67,0.6))"/>
        <circle cx="600" cy="25" r="12" fill="none" stroke="rgba(255,159,67,0.2)" stroke-width="2"/>
        <text x="0" y="138" fill="rgba(255,255,255,0.25)" font-size="9" font-family="Inter">08</text>
        <text x="100" y="138" fill="rgba(255,255,255,0.25)" font-size="9" font-family="Inter">10</text>
        <text x="200" y="138" fill="rgba(255,255,255,0.25)" font-size="9" font-family="Inter">12</text>
        <text x="300" y="138" fill="rgba(255,255,255,0.25)" font-size="9" font-family="Inter">02</text>
        <text x="400" y="138" fill="rgba(255,255,255,0.25)" font-size="9" font-family="Inter">04</text>
        <text x="580" y="138" fill="#ff9f43" font-size="9" font-family="Inter" font-weight="600">05</text>
      </svg>
    </div>
  </section>

  <!-- Panel 5: Closing -->
  <section class="panel panel--closing">
    <div class="closing__brand">META<span>VAULT</span></div>
    <div class="closing__tagline">
      统一管理物理资产、数字资产与产品订阅<br>
      数据打通 · 关联追踪 · 智能提醒
    </div>
    <div class="closing__alerts">
      <div class="closing__alerts-dot"></div>
      3 条未读提醒需要处理
    </div>
  </section>

</div>

<script>
  // Update nav dots on scroll
  const panels = document.querySelectorAll('.panel');
  const dots = document.querySelectorAll('.nav-dot');

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const index = Array.from(panels).indexOf(entry.target);
        dots.forEach((d, i) => {
          d.style.background = i === index ? 'rgba(255,255,255,0.8)' : 'rgba(255,255,255,0.2)';
          d.style.transform = i === index ? 'scale(1.3)' : 'scale(1)';
        });
      }
    });
  }, { threshold: 0.5 });

  panels.forEach(p => observer.observe(p));
</script>

</body>
</html>
